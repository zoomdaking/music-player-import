<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Подключение</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 {
            color: #FFD700;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            color: #888;
            font-size: 14px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            background: #2a2a2a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 16px 20px;
            color: #fff;
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
            font-weight: bold;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #FFD700;
        }
        input.error-border {
            border-color: #dc2626;
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        button {
            width: 100%;
            background: #FFD700;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            color: #0a0a0a;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        button:hover {
            background: #e6c200;
            transform: scale(1.02);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .hint {
            text-align: center;
            color: #888;
            font-size: 14px;
        }
        .error {
            color: #dc2626;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            min-height: 40px;
        }
        .success {
            color: #4CAF50;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }
        .manual-link {
            text-align: center;
            margin-top: 20px;
        }
        .manual-link a {
            color: #FFD700;
            text-decoration: none;
            font-size: 14px;
        }
        .ip-input {
            margin-top: 8px;
        }
        .ip-input input {
            font-size: 16px;
            letter-spacing: 1px;
            padding: 12px 16px;
        }
        .toggle-link {
            color: #FFD700;
            cursor: pointer;
            text-decoration: underline;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Music Player</h1>
        
        <div id="pinSection">
            <div class="input-group">
                <label>IP-адрес устройства</label>
                <input type="text" id="ipInput" placeholder="192.168.1.10" value="192.168.0.196">
            </div>
            <div class="input-group">
                <label>PIN-код</label>
                <input type="text" id="pinInput" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="off">
            </div>
            <button id="connectBtn">Подключиться</button>
            <div class="hint">Введите PIN-код с экрана телефона</div>
            <div id="errorMsg" class="error"></div>
        </div>
    </div>

    <script>
        const ipInput = document.getElementById('ipInput');
        const pinInput = document.getElementById('pinInput');
        const connectBtn = document.getElementById('connectBtn');
        const errorMsg = document.getElementById('errorMsg');
        
        let isConnecting = false;

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.className = 'error';
            pinInput.classList.add('error-border');
            setTimeout(() => {
                pinInput.classList.remove('error-border');
            }, 300);
        }

        function clearError() {
            errorMsg.textContent = '';
            errorMsg.className = 'error';
        }

        function showSuccess(message) {
            errorMsg.textContent = message;
            errorMsg.className = 'success';
        }

        function clearPin() {
            pinInput.value = '';
        }

        function setConnecting(connecting) {
            isConnecting = connecting;
            if (connecting) {
                connectBtn.textContent = 'Подключение...';
                connectBtn.disabled = true;
                pinInput.disabled = true;
                ipInput.disabled = true;
            } else {
                connectBtn.textContent = 'Подключиться';
                connectBtn.disabled = false;
                pinInput.disabled = false;
                ipInput.disabled = false;
                pinInput.focus();
            }
        }

        async function connect() {
            if (isConnecting) return;
            
            const ip = ipInput.value.trim();
            let pin = pinInput.value.trim();
            
            if (!ip) {
                showError('Введите IP-адрес');
                ipInput.focus();
                return;
            }
            
            if (!pin || pin.length !== 6 || !/^\d+$/.test(pin)) {
                showError('Введите 6-значный PIN-код (только цифры)');
                clearPin();
                pinInput.focus();
                return;
            }

            clearError();
            setConnecting(true);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(`http://${ip}:8081/check-pin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ pin }),
                    signal: controller.signal,
                    mode: 'cors'
                });

                clearTimeout(timeoutId);

                if (response.ok) {
                    showSuccess('PIN верный! Перенаправление...');
                    setTimeout(() => {
                        window.location.href = `http://${ip}:8081/?pin=${pin}`;
                    }, 500);
                } else {
                    let errorText = 'Неверный PIN-код';
                    try {
                        const data = await response.json();
                        errorText = data.message || errorText;
                    } catch(e) {}
                    showError(errorText);
                    clearPin();
                    setConnecting(false);
                    pinInput.focus();
                }
            } catch (error) {
                console.log('Ошибка подключения:', error);
                let errorMessage = 'Не удалось подключиться. Проверьте:';
                errorMessage += '\n• Правильный ли IP адрес';
                errorMessage += '\n• Запущен ли сервер на телефоне';
                errorMessage += '\n• Телефон и компьютер в одной сети';
                showError(errorMessage);
                clearPin();
                setConnecting(false);
                pinInput.focus();
            }
        }

        pinInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^\d]/g, '');
            if (value.length > 6) value = value.slice(0, 6);
            pinInput.value = value;
            
            clearError();
            
            if (value.length === 6) {
                connect();
            }
        });

        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && pinInput.value.length === 6) {
                connect();
            } else if (e.key === 'Enter') {
                connect();
            }
        });

        ipInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                pinInput.focus();
            }
        });

        connectBtn.addEventListener('click', connect);

        pinInput.focus();

        const savedIp = localStorage.getItem('lastUsedIp');
        if (savedIp) {
            ipInput.value = savedIp;
        }

        ipInput.addEventListener('change', () => {
            localStorage.setItem('lastUsedIp', ipInput.value.trim());
        });
    </script>
</body>
</html>
