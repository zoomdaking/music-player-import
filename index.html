<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Подключение</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px 30px;
        }
        h1 {
            color: #FFD700;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            color: #888;
            font-size: 14px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            background: #2a2a2a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 16px 20px;
            color: #fff;
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
            font-weight: bold;
        }
        input:focus {
            outline: none;
            border-color: #FFD700;
        }
        button {
            width: 100%;
            background: #FFD700;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            color: #0a0a0a;
            cursor: pointer;
            margin-bottom: 16px;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .hint {
            text-align: center;
            color: #888;
            font-size: 14px;
        }
        .error {
            color: #dc2626;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }
        .manual-link {
            text-align: center;
            margin-top: 20px;
        }
        .manual-link a {
            color: #FFD700;
            text-decoration: none;
            font-size: 14px;
        }
        .ip-input {
            margin-top: 8px;
        }
        .ip-input input {
            font-size: 16px;
            letter-spacing: 1px;
            padding: 12px 16px;
        }
        .toggle-link {
            color: #FFD700;
            cursor: pointer;
            text-decoration: underline;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Music Player</h1>
        
        <div id="pinSection">
            <div class="input-group">
                <label>IP-адрес устройства</label>
                <input type="text" id="ipInput" placeholder="192.168.1.10" value="192.168.0.196">
            </div>
            <div class="input-group">
                <label>PIN-код</label>
                <input type="text" id="pinInput" placeholder="000000" maxlength="6" inputmode="numeric">
            </div>
            <button id="connectBtn">Подключиться</button>
            <div class="hint">Введите PIN-код с экрана телефона</div>
            <div id="errorMsg" class="error"></div>
        </div>
    </div>

    <script>
        const ipInput = document.getElementById('ipInput');
        const pinInput = document.getElementById('pinInput');
        const connectBtn = document.getElementById('connectBtn');
        const errorMsg = document.getElementById('errorMsg');

        // Автофокус на поле PIN
        pinInput.focus();

        // Обработка Enter
        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                connect();
            }
        });

        ipInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                pinInput.focus();
            }
        });

        connectBtn.addEventListener('click', connect);

        async function connect() {
            const ip = ipInput.value.trim();
            const pin = pinInput.value.trim();
            
            if (!ip) {
                errorMsg.textContent = 'Введите IP-адрес';
                return;
            }
            
            if (!pin || pin.length !== 6) {
                errorMsg.textContent = 'Введите 6-значный PIN-код';
                return;
            }

            errorMsg.textContent = '';
            connectBtn.textContent = 'Подключение...';
            connectBtn.disabled = true;

            // Пробуем подключиться через fetch для проверки PIN
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(`http://${ip}:8081/check-pin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ pin }),
                    signal: controller.signal,
                    mode: 'cors'
                });

                clearTimeout(timeoutId);

                if (response.ok) {
                    // PIN верный - редиректим на локальный сервер
                    window.location.href = `http://${ip}:8081/?pin=${pin}`;
                } else {
                    const data = await response.json();
                    errorMsg.textContent = data.message || 'Неверный PIN-код';
                    connectBtn.textContent = 'Подключиться';
                    connectBtn.disabled = false;
                }
            } catch (error) {
                console.log('Ошибка подключения:', error);
                errorMsg.textContent = 'Не удалось подключиться. Проверьте IP и PIN.';
                connectBtn.textContent = 'Подключиться';
                connectBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
